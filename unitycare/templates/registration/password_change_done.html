{% extends 'base.html' %}
{% block title %}Password Changed · UnityCare{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card card-shadow">
        <div class="card-body text-center">
          <div class="mb-4">
            <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
          </div>
          <h3 class="card-title mb-3">Password Changed Successfully</h3>
          <p class="text-muted mb-4">Your password has been updated successfully. You can now use your new password to log in.</p>
          
          <div class="d-grid gap-2">
            <a href="{% url 'profile' %}" class="btn btn-primary">Back to Profile</a>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Go to Dashboard</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
