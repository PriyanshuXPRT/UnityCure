{% extends 'base.html' %}
{% block title %}Sign in · UnityCare{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
      <div class="card card-shadow">
        <div class="card-body p-4 p-md-5">
          <h3 class="mb-3">Welcome back</h3>
          <p class="text-muted mb-4">Sign in to continue to your dashboard.</p>

          <form method="post" novalidate autocomplete="off">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label" for="id_username">Username</label>
              {{ form.username }}
            </div>
            <div class="mb-3">
              <label class="form-label" for="id_password">Password</label>
              {{ form.password }}
            </div>
            <div class="d-grid">
              <button class="btn btn-gradient btn-lg" type="submit">Sign in</button>
            </div>
          </form>
          <div class="mt-3">
            <small class="text-muted">New here? Sign up as
              <a href="{% url 'signup_patient' %}">Patient</a>,
              <a href="{% url 'signup_doctor' %}">Doctor</a>, or
              <a href="{% url 'signup_hospital' %}">Hospital</a>
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
